<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardoso Perfume</title>
<style>
body { margin:0; font-family:Arial; background:linear-gradient(135deg,#8B0000,#000); color:#fff; min-height:100vh; position:relative; }
body::before { content:"CARDOSO PERFUME"; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) rotate(-30deg); font-size:120px; color:rgba(255,235,59,0.05); pointer-events:none; z-index:0; }
header { position:fixed; top:0; width:100%; background:rgba(17,17,17,0.95); padding:15px 20px; text-align:center; font-size:28px; font-weight:bold; color:#ffeb3b; z-index:10; }
.container { padding:120px 20px 20px; max-width:500px; margin:auto; backdrop-filter:blur(8px); background:rgba(0,0,0,0.6); border-radius:15px; z-index:1; position:relative; }
.card { background:linear-gradient(135deg,#ff0000,#8B0000); color:#fff; padding:15px 20px; margin:15px 0; border-radius:15px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition: transform 0.2s, box-shadow 0.2s; }
.card:hover { transform:translateY(-5px); box-shadow:0 6px 20px rgba(0,0,0,0.7);}
.card button { background:#000; color:#ffeb3b; border:none; padding:10px 15px; border-radius:10px; font-weight:bold; cursor:pointer;}
.card button:hover { background:#222;}
input[type="number"] { width:100%; padding:12px; border-radius:10px; border:none; margin:10px 0; font-size:16px; }
.total-box { margin-top:10px; font-size:20px; font-weight:bold; color:#00ff00; text-align:center; }
.pix-box { display:none; background:rgba(34,34,34,0.95); padding:20px; margin-top:20px; border-radius:15px; text-align:center; }
.pix-box img { margin-top:15px; width:200px; height:200px; }
button.generate,input[type="submit"],button.copy-btn { width:100%; padding:15px; font-size:18px; margin-top:15px; border-radius:15px; background:#ffeb3b; color:#000; font-weight:bold; cursor:pointer; border:none; transition:opacity 0.2s;}
button.generate:hover,input[type="submit"]:hover,button.copy-btn:hover{opacity:0.8;}
a.whatsapp-btn { position:fixed; bottom:20px; right:20px; background:#25d366; color:#fff; padding:18px; border-radius:50%; font-size:28px; text-align:center; text-decoration:none; z-index:10; }
a.whatsapp-btn:hover { opacity:0.8; }
</style>
</head>
<body>
<header>Cardoso Perfume</header>
<div class="container">
<h3>Pacotes fixos:</h3>
<div class="card"><span>1.000 perfumes</span><span>R$ 0,60</span><button onclick="addCart(1000,0.6)">Comprar</button></div>
<div class="card"><span>10.000 perfumes</span><span>R$ 6,00</span><button onclick="addCart(10000,6)">Comprar</button></div>
<div class="card"><span>25.000 perfumes</span><span>R$ 15,00</span><button onclick="addCart(25000,15)">Comprar</button></div>
<div class="card"><span>50.000 perfumes</span><span>R$ 30,00</span><button onclick="addCart(50000,30)">Comprar</button></div>

<h3>Quantidade personalizada:</h3>
<input type="number" id="quantidade" placeholder="Digite a quantidade">
<button class="generate" onclick="addCustom()">Adicionar ao carrinho</button>

<div class="total-box" id="total">Total: R$ 0,00</div>
<button class="generate" onclick="gerarPix()">Gerar PIX</button>

<div id="pagamento" class="pix-box">
<h2>Pagamento via PIX</h2>
<p><strong>Chave PIX (CPF):</strong> 44879579823</p>
<p id="valorFinal"></p>
<img id="qrcode">
<button class="copy-btn" onclick="copiarPix()">Copiar PIX</button>
<p id="tempoEntrega"><strong>Entrega:</strong> Calculando...</p>

<h2>Pagamentos internacionais</h2>
<form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
<input type="hidden" name="cmd" value="_xclick">
<input type="hidden" name="business" value="SEU_EMAIL_PAYPAL">
<input type="hidden" name="item_name" value="Perfume Cardoso">
<input type="hidden" name="amount" id="valorUSD" value="0">
<input type="hidden" name="currency_code" value="USD">
<input type="submit" value="Pagar em USD">
</form>

<form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
<input type="hidden" name="cmd" value="_xclick">
<input type="hidden" name="business" value="SEU_EMAIL_PAYPAL">
<input type="hidden" name="item_name" value="Perfume Cardoso">
<input type="hidden" name="amount" id="valorEUR" value="0">
<input type="hidden" name="currency_code" value="EUR">
<input type="submit" value="Pagar em EUR">
</form>

<form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
<input type="hidden" name="cmd" value="_xclick">
<input type="hidden" name="business" value="SEU_EMAIL_PAYPAL">
<input type="hidden" name="item_name" value="Perfume Cardoso">
<input type="hidden" name="amount" id="valorARS" value="0">
<input type="hidden" name="currency_code" value="ARS">
<input type="submit" value="Pagar em ARS">
</form>
</div>
</div>

<a href="https://wa.me/5518991857067" target="_blank" class="whatsapp-btn">📱</a>

<script>
let cart=[],total=0,entregaDeadline=null,entregaInterval=null;
const taxaUSD=5,taxaEUR=5.5,taxaARS=0.027;

function atualizarTotal(){document.getElementById("total").innerText="Total: R$ "+total.toFixed(2);}
function addCart(q,v){cart.push({q,v});total+=v;atualizarTotal();}
function addCustom(){let q=parseInt(document.getElementById("quantidade").value)||0;if(q<=0){alert("Digite uma quantidade válida!");return;}let v=(q/1000)*0.6;addCart(q,v);document.getElementById("quantidade").value='';}
function iniciarEntrega(){if(!entregaDeadline)return;clearInterval(entregaInterval);entregaInterval=setInterval(()=>{let now=new Date().getTime(),dist=entregaDeadline-now;if(dist<=0){clearInterval(entregaInterval);document.getElementById("tempoEntrega").innerHTML="<strong>Entrega:</strong> Pedido entregue!";return;}let h=Math.floor(dist/(1000*60*60)),m=Math.floor((dist%(1000*60*60))/(1000*60)),s=Math.floor((dist%(1000*60))/1000);document.getElementById("tempoEntrega").innerHTML=`<strong>Entrega:</strong> ${h}h ${m}m ${s}s`;},1000);}
function gerarPix(){if(total<=0){alert("Adicione pelo menos um item!");return;}let totalPerf=cart.reduce((acc,it)=>acc+it.q,0);document.getElementById("pagamento").style.display="block";document.getElementById("valorFinal").innerHTML=`<strong>Quantidade total:</strong> ${totalPerf}<br><strong>Valor total:</strong> R$ ${total.toFixed(2)}`;document.getElementById("qrcode").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(`PIX CPF 44879579823 VALOR ${total.toFixed(2)} QTD ${totalPerf}`);entregaDeadline=new Date().getTime()+24*60*60*1000;iniciarEntrega();document.getElementById("valorUSD").value=(total/taxaUSD).toFixed(2);document.getElementById("valorEUR").value=(total/taxaEUR).toFixed(2);document.getElementById("valorARS").value=(total/taxaARS).toFixed(2);}
function copiarPix(){let totalPerf=cart.reduce((acc,it)=>acc+it.q,0);let val=total.toFixed(2);navigator.clipboard.writeText(`PIX CPF 44879579823 VALOR R$ ${val} QTD ${totalPerf}`).then(()=>{alert("PIX copiado!");});cart=[];total=0;atualizarTotal();}
</script>
</body>
</html>
