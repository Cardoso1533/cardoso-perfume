<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfume Cardoso</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #0a0a0a;
  background-image: url('logo.png');
  background-repeat: repeat;
  background-position: center;
  background-size: 150px 150px;
  background-attachment: fixed;
  color: #fff;
}
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(17,17,17,0.95);
  padding: 15px 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: #ffeb3b;
  box-shadow: 0 2px 5px rgba(0,0,0,0.5);
  z-index: 10;
}
.container {
  padding: 100px 20px 20px;
  max-width: 500px;
  margin: auto;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
}
.card {
  background: rgba(26,26,26,0.9);
  padding: 20px;
  margin: 15px 0;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  transition: transform 0.2s;
}
.card:hover {
  transform: translateY(-3px);
}
button {
  background: #ffeb3b;
  color: #000;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
  transition: opacity 0.2s;
}
button:hover {
  opacity: 0.8;
}
.pix-box {
  display: none;
  background: rgba(34,34,34,0.95);
  padding: 20px;
  margin-top: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  text-align: center;
}
.pix-box p {
  margin: 5px 0;
  font-size: 16px;
}
a.whatsapp-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: #fff;
  padding: 15px;
  border-radius: 50%;
  font-size: 24px;
  text-align: center;
  text-decoration: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  z-index: 10;
}
a.whatsapp-btn:hover {
  opacity: 0.8;
}
img.qr {
  margin-top: 15px;
  width: 200px;
  height: 200px;
}
</style>
</head>
<body>

<header>Perfume Cardoso</header>

<div class="container">
  <p>Escolha seu pacote:</p>

  <div class="card">
    <h3>1.000 Perfumes</h3>
    <p>R$ 0,60</p>
    <button onclick="pagar(0.60)">Comprar</button>
  </div>

  <div class="card">
    <h3>10.000 Perfumes</h3>
    <p>R$ 6,00</p>
    <button onclick="pagar(6.00)">Comprar</button>
  </div>

  <div class="card">
    <h3>25.000 Perfumes</h3>
    <p>R$ 15,00</p>
    <button onclick="pagar(15.00)">Comprar</button>
  </div>

  <div class="card">
    <h3>50.000 Perfumes</h3>
    <p>R$ 30,00</p>
    <button onclick="pagar(30.00)">Comprar</button>
  </div>

  <div class="card">
    <h3>200.000 Perfumes</h3>
    <p>R$ 120,00</p>
    <button onclick="pagar(120.00)">Comprar</button>
  </div>

  <div class="card">
    <h3>500.000 Perfumes</h3>
    <p>R$ 300,00</p>
    <button onclick="pagar(300.00)">Comprar</button>
  </div>

  <div id="pagamento" class="pix-box">
    <h2>Pagamento via PIX</h2>
    <p><strong>Chave PIX (CPF):</strong></p>
    <p>44879579823</p>
    <p id="valor"></p>
    <img id="qrcode" class="qr" />
  </div>
</div>

<a href="https://wa.me/5518991857067" target="_blank" class="whatsapp-btn">📱</a>

<script>
function pagar(valor){
  const pagamento = document.getElementById("pagamento");
  pagamento.style.display = "block";
  document.getElementById("valor").innerHTML = "<strong>Valor a pagar:</strong> R$ " + valor.toFixed(2);

  const pixTexto = "PIX CPF 44879579823 VALOR " + valor.toFixed(2);
  const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(pixTexto);
  document.getElementById("qrcode").src = qrUrl;

  window.scrollTo({top: pagamento.offsetTop, behavior: 'smooth'});
}
</script>

</body>
</html>
