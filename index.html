<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfume Cardoso</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #0a0a0a;
  background-image: url('logo.png');
  background-repeat: repeat;
  background-position: center;
  background-size: 150px 150px;
  background-attachment: fixed;
  color: #fff;
}
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(17,17,17,0.95);
  padding: 15px 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: #ffeb3b;
  box-shadow: 0 2px 5px rgba(0,0,0,0.5);
  z-index: 10;
}
.container {
  padding: 100px 20px 20px;
  max-width: 500px;
  margin: auto;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.6);
  border-radius: 10px;
}
label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}
input[type="number"] {
  width: 100%;
  padding: 8px;
  border-radius: 5px;
  border: none;
  margin-bottom: 10px;
}
button {
  background: #ffeb3b;
  color: #000;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 5px;
  transition: opacity 0.2s;
}
button:hover {
  opacity: 0.8;
}
.cart-box {
  margin-top: 15px;
  background: rgba(34,34,34,0.9);
  padding: 10px;
  border-radius: 10px;
}
.cart-item {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
}
.pix-box {
  display: none;
  background: rgba(34,34,34,0.95);
  padding: 20px;
  margin-top: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  text-align: center;
}
.pix-box p {
  margin: 5px 0;
  font-size: 16px;
}
a.whatsapp-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: #fff;
  padding: 15px;
  border-radius: 50%;
  font-size: 24px;
  text-align: center;
  text-decoration: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  z-index: 10;
}
a.whatsapp-btn:hover {
  opacity: 0.8;
}
img.qr {
  margin-top: 15px;
  width: 200px;
  height: 200px;
}
.total-box {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
  color: #00ff00;
}
.admin-panel {
  margin-top: 20px;
  background: rgba(26,26,26,0.9);
  padding: 10px;
  border-radius: 10px;
}
.admin-item {
  padding: 5px 0;
  border-bottom: 1px solid #555;
}
</style>
</head>
<body>

<header>
  Perfume Cardoso
  <button style="position:absolute; right:20px; top:15px; padding:5px 10px;" onclick="toggleAdmin()">Admin</button>
</header>

<div class="container">

  <!-- Carrinho -->
  <label for="quantidade">Digite a quantidade de perfumes:</label>
  <input type="number" id="quantidade" placeholder="Ex: 1000" min="1">

  <button onclick="adicionarCarrinho()">Adicionar ao carrinho</button>

  <div class="cart-box" id="carrinho">
    <p><strong>Carrinho:</strong></p>
    <div id="itensCarrinho"></div>
    <div class="total-box" id="total">Total: R$ 0,00</div>
  </div>

  <button onclick="gerarPix()">Gerar PIX</button>

  <div id="pagamento" class="pix-box">
    <h2>Pagamento via PIX</h2>
    <p><strong>Chave PIX (CPF):</strong> 44879579823</p>
    <p id="valorFinal"></p>
    <img id="qrcode" class="qr" />
  </div>

  <!-- Painel Admin -->
  <div id="admin" class="admin-panel" style="display:none;">
    <h3>Pedidos Registrados</h3>
    <div id="pedidos"></div>
  </div>
</div>

<a href="https://wa.me/5518991857067" target="_blank" class="whatsapp-btn">📱</a>

<script>
let carrinho = [];
let total = 0;
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

function atualizarCarrinho(){
  const itensDiv = document.getElementById("itensCarrinho");
  itensDiv.innerHTML = '';
  carrinho.forEach((item,index)=>{
    const div = document.createElement('div');
    div.className='cart-item';
    div.innerHTML = `Item ${index+1}: ${item.quantidade} perfumes - R$ ${item.valor.toFixed(2)}`;
    itensDiv.appendChild(div);
  });
  document.getElementById("total").innerHTML="Total: R$ "+total.toFixed(2);
}

function adicionarCarrinho(){
  const quantidade = parseInt(document.getElementById("quantidade").value)||0;
  if(quantidade<=0){alert("Digite uma quantidade válida!");return;}
  const valor=(quantidade/1000)*0.6;
  total+=valor;
  carrinho.push({quantidade,valor});
  atualizarCarrinho();
  document.getElementById("quantidade").value='';
}

function gerarPix(){
  if(total<=0){alert("Adicione pelo menos um item ao carrinho!");return;}
  const totalPerfumes=carrinho.reduce((acc,item)=>acc+item.quantidade,0);

  // Salvar pedido
  const novoPedido={id:Date.now(),total,totalPerfumes,data:new Date().toLocaleString()};
  pedidos=[novoPedido,...pedidos];
  localStorage.setItem("pedidos",JSON.stringify(pedidos));

  const pagamento=document.getElementById("pagamento");
  pagamento.style.display='block';
  document.getElementById("valorFinal").innerHTML=`<strong>Quantidade total:</strong> ${totalPerfumes}<br><strong>Valor total:</strong> R$ ${total.toFixed(2)}`;
  const pixTexto=`PIX CPF 44879579823 VALOR ${total.toFixed(2)} QUANTIDADE TOTAL: ${totalPerfumes}`;
  document.getElementById("qrcode").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(pixTexto);

  // Reset carrinho
  carrinho=[]; total=0; atualizarCarrinho();
}

function toggleAdmin(){
  const adminDiv=document.getElementById("admin");
  adminDiv.style.display=adminDiv.style.display==='none'?'block':'none';
  atualizarPedidos();
}

function atualizarPedidos(){
  const pedidosDiv=document.getElementById("pedidos");
  pedidosDiv.innerHTML='';
  if(pedidos.length===0){pedidosDiv.innerHTML="<p>Nenhum pedido registrado.</p>";return;}
  pedidos.forEach(p=>{
    const div=document.createElement('div');
    div.className='admin-item';
    div.innerHTML=`ID: ${p.id}<br>Quantidade: ${p.totalPerfumes}<br>Valor: R$ ${p.total.toFixed(2)}<br><small>${p.data}</small>`;
    pedidosDiv.appendChild(div);
  });
}

// Inicializa painel com pedidos salvos
atualizarPedidos();
</script>

</body>
</html>
