<!-- Botão para enviar pedido para WhatsApp -->
<button onclick="enviarWhatsApp()" class="generate">Enviar Pedido pelo WhatsApp</button>

<script>
let cart=[],total=0,entregaDeadline=null,entregaInterval=null;

function atualizarTotal(){document.getElementById("total").innerText="Total: R$ "+total.toFixed(2);}
function addCart(q,v){cart.push({q,v});total+=v;atualizarTotal();}
function addCustom(){let q=parseInt(document.getElementById("quantidade").value)||0;if(q<=0){alert("Digite uma quantidade válida!");return;}let v=(q/1000)*0.6;addCart(q,v);document.getElementById("quantidade").value='';}
function iniciarEntrega(){if(!entregaDeadline)return;clearInterval(entregaInterval);entregaInterval=setInterval(()=>{let now=new Date().getTime(),dist=entregaDeadline-now;if(dist<=0){clearInterval(entregaInterval);document.getElementById("tempoEntregaPIX").innerHTML="<strong>Entrega:</strong> Pedido entregue!";return;}let h=Math.floor(dist/(1000*60*60)),m=Math.floor((dist%(1000*60*60))/(1000*60)),s=Math.floor((dist%(1000*60))/1000);document.getElementById("tempoEntregaPIX").innerHTML=`<strong>Entrega:</strong> ${h}h ${m}m ${s}s`;},1000);}
function gerarPagamento(){
  if(total<=0){alert("Adicione pelo menos um item!"); return;}
  // PIX
  let totalPerf=cart.reduce((acc,it)=>acc+it.q,0);
  document.getElementById("pagamentoPIX").style.display="block";
  document.getElementById("valorFinalPIX").innerHTML=`<strong>Quantidade total:</strong> ${totalPerf}<br><strong>Valor total:</strong> R$ ${total.toFixed(2)}`;
  document.getElementById("qrcodePIX").src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+encodeURIComponent(`PIX CPF 44879579823 VALOR ${total.toFixed(2)} QTD ${totalPerf}`);
  entregaDeadline=new Date().getTime()+24*60*60*1000;iniciarEntrega();

  // TapTapSend
  document.getElementById("pagamentoTapTap").style.display="block";
  document.getElementById("valorFinalTapTap").innerText="R$ "+total.toFixed(2);
}

// Copiar PIX
function copiarPix(){let totalPerf=cart.reduce((acc,it)=>acc+it.q,0);let val=total.toFixed(2);navigator.clipboard.writeText(`PIX CPF 44879579823 VALOR R$ ${val} QTD ${totalPerf}`).then(()=>{alert("PIX copiado!");});cart=[];total=0;atualizarTotal();}

// Abrir TapTapSend
function abrirTapTap(){window.location.href="taptapsend://";}

// Enviar pedido para WhatsApp
function enviarWhatsApp(){
  if(cart.length === 0){alert("Adicione produtos antes de enviar o pedido!"); return;}
  let totalPerf = cart.reduce((acc,it)=>acc+it.q,0);
  let valorTotal = total.toFixed(2);
  let mensagem = `Olá! Realizei um pedido:\nQuantidade: ${totalPerf}\nValor: R$ ${valorTotal}\nPagamento: PIX/TapTapSend\nData: ${new Date().toLocaleString()}`;
  let numero = "5518991857067"; // seu WhatsApp
  let link = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
  window.open(link, "_blank");
  cart=[]; total=0; atualizarTotal();
}
</script>
