<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardoso Perfume</title>
<style>
/* Fundo degradê vermelho e preto */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #8B0000, #000000);
  color: #fff;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: "CARDOSO PERFUME";
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-30deg);
  font-size: 120px;
  color: rgba(255,235,59,0.05);
  white-space: nowrap;
  pointer-events: none;
  z-index: 0;
}
/* Header */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(17,17,17,0.95);
  padding: 15px 20px;
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: #ffeb3b;
  box-shadow: 0 2px 5px rgba(0,0,0,0.5);
  z-index: 10;
}
/* Container */
.container {
  padding: 120px 20px 20px;
  max-width: 500px;
  margin: auto;
  backdrop-filter: blur(8px);
  background: rgba(0,0,0,0.6);
  border-radius: 15px;
  position: relative;
  z-index: 1;
}
/* Cards de pacotes */
.card {
  background: linear-gradient(135deg, #ff0000, #8B0000);
  color: #fff;
  padding: 15px 20px;
  margin: 15px 0;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.7);
}
.card button {
  background: #000;
  color: #ffeb3b;
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
.card button:hover {
  background: #222;
}
/* Input personalizado */
input[type="number"] {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 10px 0;
  font-size: 16px;
}
/* Carrinho */
.total-box {
  margin-top: 10px;
  font-size: 20px;
  font-weight: bold;
  color: #00ff00;
  text-align: center;
}
/* PIX box */
.pix-box {
  display: none;
  background: rgba(34,34,34,0.95);
  padding: 20px;
  margin-top: 20px;
  border-radius: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  text-align: center;
}
.pix-box img {
  margin-top: 15px;
  width: 200px;
  height: 200px;
}
button.generate {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  margin-top: 15px;
  border-radius: 15px;
  background: #ffeb3b;
  color: #000;
  font-weight: bold;
  cursor: pointer;
  border: none;
  transition: opacity 0.2s;
}
button.generate:hover {
  opacity: 0.8;
}
button.copy-btn {
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#ffeb3b;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}
button.copy-btn:hover{
  opacity:0.8;
}
/* WhatsApp */
a.whatsapp-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25d366;
  color: #fff;
  padding: 18px;
  border-radius: 50%;
  font-size: 28px;
  text-align: center;
  text-decoration: none;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  z-index: 10;
}
a.whatsapp-btn:hover {
  opacity: 0.8;
}
</style>
</head>
<body>

<header>Cardoso Perfume</header>

  <div class="card"><span>1.000 perfumes</span><span>R$ 0,60</span><button onclick="adicionarCarrinho(1000,0.6)">Comprar</button></div>
  <div class="card"><span>10.000 perfumes</span><span>R$ 6,00</span><button onclick="adicionarCarrinho(10000,6)">Comprar</button></div>
  <div class="card"><span>25.000 perfumes</span><span>R$ 15,00</span><button onclick="adicionarCarrinho(25000,15)">Comprar</button></div>
  <div class="card"><span>50.000 perfumes</span><span>R$ 30,00</span><button onclick="adicionarCarrinho(50000,30)">Comprar</button></div>
