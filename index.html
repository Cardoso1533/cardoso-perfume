<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cardoso Perfumes RioRise</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0a0a0a;
    color:#fff;
    text-align:center;
}

header {
    background:#000;
    padding:15px;
}

header h1 {
    color:#00ffcc;
}

.container {
    max-width:500px;
    margin:auto;
    padding:15px;
}

.box {
    background:#111;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
}

button {
    width:100%;
    padding:14px;
    margin-top:5px;
    border:none;
    border-radius:10px;
    background:#00ffcc;
    color:#000;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:active {
    transform:scale(0.95);
}

input {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

.item {
    background:#1a1a1a;
    padding:10px;
    margin-top:8px;
    border-radius:8px;
}

.total {
    font-size:20px;
    color:#00ffcc;
    font-weight:bold;
}

.alert {
    color:#ff4444;
    font-weight:bold;
}

#notificacao {
    position:fixed;
    bottom:20px;
    left:20px;
    background:#00ffcc;
    color:#000;
    padding:10px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<header>
<h1>💰 Cardoso Perfumes • RioRise</h1>
<p>Qualidade, rapidez e confiança</p>
<p id="contadorVendas"></p>
</header>

<div class="container">

<div class="box">
<h3>👤 Seus dados</h3>
<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="servidor" placeholder="Servidor (ex: BR1)">
<input type="text" id="nick" placeholder="Nick do jogador">
</div>

<div class="box">
<h3>🛒 Quantidade</h3>

<input type="number" id="quantidadeK" placeholder="Ex: 50 = 50k" min="1" max="1000">

<p style="color:#00ffcc;">🔥 Mais vendidos</p>

<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;">
<button onclick="selecionar(10)">10k</button>
<button onclick="selecionar(100)">100k</button>
<button onclick="selecionar(200)" style="background:#ff4444; color:#fff;">🔥 200k</button>

<button onclick="selecionar(300)">300k</button>
<button onclick="selecionar(500)" style="background:#ffd700; color:#000;">👑 500k</button>
<button onclick="selecionar(1000)">1kk</button>
</div>

<p id="preview"></p>

<button onclick="calcular()">Adicionar ao carrinho</button>
</div>

<div class="box">
<h3>📦 Carrinho</h3>
<div id="carrinho"></div>
<p class="total" id="total">Total: R$ 0</p>
<button onclick="limpar()">Limpar Carrinho</button>
</div>

<div class="box">
<p class="alert">⚠️ Pagamento após confirmação no WhatsApp</p>
<p style="color:#ff4444;">⚠️ Promoção pode acabar a qualquer momento</p>
<button onclick="finalizar()">📲 Finalizar Pedido</button>
</div>

</div>

<div id="notificacao"></div>

<script>
let carrinho = [];
let total = 0;

function selecionar(k){
    document.getElementById("quantidadeK").value = k;
    atualizarPreview();
}

function atualizarPreview(){
    let k = document.getElementById("quantidadeK").value;

    if(!k) return;

    let preco = k >= 200 ? 0.40 : 0.50;
    let valor = k * preco;

    document.getElementById("preview").innerText =
        "Valor: R$ " + valor.toFixed(2) +
        (k >= 200 ? " (com desconto)" : "");
}

document.getElementById("quantidadeK").addEventListener("input", atualizarPreview);

function calcular(){
    let k = parseInt(document.getElementById("quantidadeK").value);

    if(!k || k < 1 || k > 1000){
        alert("Digite de 1k até 1kk!");
        return;
    }

    let preco = k >= 200 ? 0.40 : 0.50;
    let valor = k * preco;
    let quantidade = k * 1000;

    carrinho.push({
        nome: quantidade.toLocaleString() + " unidades",
        valor: valor
    });

    total += valor;

    atualizar();

    document.getElementById("quantidadeK").value = "";
    document.getElementById("preview").innerText = "";
}

function atualizar(){
    let div = document.getElementById("carrinho");
    div.innerHTML = "";

    carrinho.forEach(p => {
        div.innerHTML += `<div class="item">${p.nome} - R$ ${p.valor}</div>`;
    });

    document.getElementById("total").innerText = "Total: R$ " + total;
}

function limpar(){
    carrinho = [];
    total = 0;
    atualizar();
}

function finalizar(){
    let nome = document.getElementById("nome").value;
    let servidor = document.getElementById("servidor").value;
    let nick = document.getElementById("nick").value;

    if(!nome || !servidor || !nick){
        alert("Preencha todos os dados!");
        return;
    }

    if(carrinho.length === 0){
        alert("Carrinho vazio!");
        return;
    }

    let msg = `Pedido:\nNome: ${nome}\nServidor: ${servidor}\nNick: ${nick}\n\n`;

    carrinho.forEach(p=>{
        msg += `${p.nome} - R$ ${p.valor}\n`;
    });

    msg += `\nTotal: R$ ${total}`;

    let link = `https://wa.me/5518991857067?text=${encodeURIComponent(msg)}`;
    window.open(link, "_blank");

    limpar();
}

// contador
let pessoas = 12;
function atualizarContador(){
    pessoas += Math.floor(Math.random() * 3);
    document.getElementById("contadorVendas").innerText =
        pessoas + " pessoas compraram hoje 🔥";
}
setInterval(atualizarContador, 5000);
atualizarContador();

// notificações
function notificar(){
    let nomes = ["Lucas","Maria","João","Ana","Carlos"];
    let valores = ["100k","200k","500k"];

    let nome = nomes[Math.floor(Math.random()*nomes.length)];
    let valor = valores[Math.floor(Math.random()*valores.length)];

    let n = document.getElementById("notificacao");

    n.innerText = nome + " comprou " + valor;
    n.style.display = "block";

    setTimeout(()=>{
        n.style.display = "none";
    },3000);
}
setInterval(notificar, 7000);
</script>

</body>
</html>
